{%- assign path = page.url -%}
<header class="site-header">
  <div class="wrap site-header__row">
    <a href="{{ '/' | relative_url }}" class="brand">Sidak <em>Plaha</em></a>
    <nav class="nav">
      <a href="{{ '/' | relative_url }}"{% if path == "/" %} class="is-active"{% endif %}>Index</a>
      <a href="{{ '/work/' | relative_url }}"{% if path contains "/work" or path contains "/projects/" %} class="is-active"{% endif %}>Work</a>
      <a href="{{ '/about/' | relative_url }}"{% if path contains "/about" %} class="is-active"{% endif %}>About</a>
      <a href="mailto:{{ site.email }}">Contact</a>
    </nav>
  </div>
</header>
