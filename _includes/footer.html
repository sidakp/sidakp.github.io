<footer class="site-footer">
  <div class="container footer__inner">
    <p class="footer__copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</p>
    <ul class="footer__links">
      <li>
        <a href="mailto:{{ site.email }}" aria-label="Email">
          Email
        </a>
      </li>
      <li>
        <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener" aria-label="LinkedIn">
          LinkedIn
        </a>
      </li>
      <li>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" aria-label="GitHub">
          GitHub
        </a>
      </li>
    </ul>
  </div>
</footer>
