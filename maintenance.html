<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>site in progress | sidak plaha</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<style>
@font-face {
  font-family: 'Satoshi';
  src: url('./fonts/Honeychrome-VariableVF.woff2') format('woff2-variations'),
       url('./fonts/Satoshi-Variable.woff2') format('woff2');
  font-weight: normal;
  font-stretch: normal;
  font-style: normal;
  font-display: swap;
  size-adjust: 88%;
}

@font-face {
  font-family: 'Erode';
  src: url('./fonts/Honeychrome-VariableVF.woff2') format('woff2-variations'),
       url('./fonts/Erode-Variable.woff2') format('woff2');
  font-weight: normal;
  font-stretch: normal;
  font-style: normal;
  font-display: swap;
  size-adjust: 88%;
}

@font-face {
  font-family: 'Satoshi Headings';
  src: url('./fonts/Satoshi-Variable.woff2') format('woff2-variations');
  font-weight: 300 900;
  font-style: normal;
  font-display: swap;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --pad: 52px;
  --accent: #88481E;
  --bg: #FAF6F0;
  --surface: #F0EDE7;
  --surface-hover: color-mix(in srgb, #F0EDE7 72%, #D1AB92);
  --text: #542A1B;
  --text-soft: #88481E;
  --text-muted: color-mix(in srgb, #542A1B 68%, #D1AB92);
  --text-faint: color-mix(in srgb, #542A1B 46%, #F0EDE7);
  --border: color-mix(in srgb, #D1AB92 62%, #FAF6F0);
  --header-bg-strong: color-mix(in srgb, var(--bg) 96%, transparent);
  --header-bg-mid: color-mix(in srgb, var(--bg) 76%, transparent);
  --page-w: 1180px;
  --h1: 74px;
  --body-lg: 18px;
  --body: 15px;
  --label: 12px;
}

html {
  background: var(--bg);
}

body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Erode', Georgia, serif;
  font-variation-settings: 'wght' 0, 'wdth' 0;
  font-synthesis: none;
  letter-spacing: 0.012em;
  -webkit-font-smoothing: antialiased;
}

h1,
h2,
h3,
h4,
h5,
h6,
.title {
  font-family: 'Satoshi Headings', sans-serif !important;
  font-variation-settings: normal !important;
  letter-spacing: 0;
}

h1 *,
h2 *,
h3 *,
h4 *,
h5 *,
h6 * {
  font-variation-settings: normal !important;
}

::selection {
  background: color-mix(in srgb, #D1AB92 54%, transparent);
}

.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px var(--pad);
  background: linear-gradient(180deg, var(--header-bg-strong) 0%, var(--header-bg-mid) 78%, transparent 100%);
}

.status-label,
.title {
  font-family: 'Satoshi', sans-serif;
  letter-spacing: 0;
}

.status-label {
  color: #787570;
  font-size: var(--label);
  font-weight: 500;
  font-variation-settings: 'wght' 20, 'wdth' 0;
  line-height: 1.2;
  text-transform: uppercase;
  user-select: none;
}

.shell {
  display: grid;
  align-items: center;
  min-height: 100vh;
  max-width: var(--page-w);
  margin: 0 auto;
  padding: 140px var(--pad) 72px;
}

.panel {
  max-width: 720px;
  border: 1px solid #181816;
  border-radius: 8px;
  background: #050505;
  padding: 30px;
}

.title {
  max-width: 620px;
  margin: 20px 0 22px;
  color: var(--text);
  font-size: var(--h1);
  font-weight: 300;
  font-variation-settings: 'wght' 0, 'wdth' 0;
  line-height: 1.03;
}

.title strong {
  font-weight: 700;
  font-variation-settings: 'wght' 72, 'wdth' 0;
}

.copy {
  max-width: 560px;
  color: #aaa7a0;
  font-size: var(--body-lg);
  line-height: 1.58;
  text-wrap: pretty;
}

.detail {
  margin-top: 24px;
  color: #68635b;
  font-size: var(--body);
  line-height: 1.58;
}

@media (max-height: 780px) and (min-width: 981px) {
  :root {
    --h1: 64px;
    --body-lg: 16px;
    --body: 14px;
  }

  .shell {
    padding-top: 112px;
    padding-bottom: 52px;
  }
}

@media (max-width: 980px) {
  :root {
    --pad: 30px;
    --h1: 54px;
    --body-lg: 17px;
  }
}

@media (max-width: 560px) {
  :root {
    --pad: 18px;
    --h1: 40px;
    --body-lg: 16px;
    --body: 14px;
  }

  .site-header {
    padding: 18px var(--pad);
  }

  .shell {
    padding-top: 104px;
    padding-bottom: 44px;
  }

  .panel {
    padding: 22px;
  }
}

.status-label,
.detail {
  color: var(--text-faint);
}

.title {
  color: var(--text);
}

.copy {
  color: var(--text-muted);
}

.panel {
  border-color: var(--border);
  background: var(--surface);
}
</style>
</head>
<body>
<header class="site-header">
  <p class="status-label">sidak plaha</p>
</header>

<main class="shell">
  <section class="panel" aria-labelledby="maintenance-title">
    <p class="status-label">site in progress</p>
    <h1 id="maintenance-title" class="title"><strong>Back soon.</strong></h1>
    <p class="copy">I am refining the site locally before reopening it with the finished version.</p>
    <p class="detail">Please check back shortly.</p>
  </section>
</main>
</body>
</html>
